# nginx server block snippet — thaiholidaybudget.com
# Canonical host https://thaiholidaybudget.com (non-www). Include inside http{}.

# 1. Redirect http + www -> https://thaiholidaybudget.com
server {
    listen 80;
    listen [::]:80;
    server_name thaiholidaybudget.com www.thaiholidaybudget.com;
    return 301 https://thaiholidaybudget.com$request_uri;
}
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.thaiholidaybudget.com;
    # ssl_certificate / ssl_certificate_key ... (your cert paths)
    return 301 https://thaiholidaybudget.com$request_uri;
}

# 2. Canonical host
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thaiholidaybudget.com;
    root /var/www/thaiholidaybudget;
    index index.html;

    # ssl_certificate / ssl_certificate_key ... (your cert paths)

    # --- Security / trust headers ---
    add_header X-Content-Type-Options            "nosniff" always;
    add_header Referrer-Policy                   "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy                "geolocation=(), microphone=(), camera=(), payment=(), usb=(), browsing-topics=()" always;
    add_header X-Frame-Options                   "SAMEORIGIN" always;
    add_header Cross-Origin-Opener-Policy        "same-origin-allow-popups" always;
    add_header Strict-Transport-Security         "max-age=63072000; includeSubDomains; preload" always;

    # --- Compression ---
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    # brotli on; brotli_types text/css application/javascript image/svg+xml;  # if ngx_brotli is built

    # --- Caching ---
    location ~* \.(?:jpg|jpeg|png|webp|svg|ico|css|js|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # --- Per-file indexing controls ---
    location = /cookie-settings.html   { add_header X-Robots-Tag "noindex, follow" always; }
    location = /index-v1-backup.html   { add_header X-Robots-Tag "noindex, nofollow" always; return 200; }

    location / { try_files $uri $uri/ =404; }
}
